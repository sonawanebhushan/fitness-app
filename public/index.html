<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        /* Grid pattern overlay */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 60px;
            letter-spacing: -0.01em;
        }

        .label {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .user-cards {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .user-card {
            width: 240px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 32px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.05));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 20px;
        }

        .user-card:hover::before {
            opacity: 1;
        }

        .user-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                        0 0 60px rgba(99, 102, 241, 0.1);
        }

        .user-card:active {
            transform: translateY(-2px);
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            position: relative;
            z-index: 1;
        }

        .avatar.arun {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .avatar.bhushan {
            background: linear-gradient(135deg, #a855f7, #c084fc);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
        }

        .user-name {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        .user-role {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .arrow-icon {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 1.2rem;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .user-card:hover .arrow-icon {
            color: rgba(99, 102, 241, 0.8);
            transform: translateX(4px);
        }

        .footer {
            position: fixed;
            bottom: 32px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 2;
        }

        /* Entry animations */
        .content {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .user-card:nth-child(1) {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        .user-card:nth-child(2) {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 560px) {
            h1 { font-size: 2.2rem; }
            .user-cards { flex-direction: column; align-items: center; }
            .user-card { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <div class="content">
        <div class="logo">
            <div class="logo-icon">W</div>
        </div>
        <h1>Workout Buddy</h1>
        <p class="subtitle">Track your workouts. Crush your goals.</p>

        <p class="label">Select your profile</p>

        <div class="user-cards">
            <a href="/select-user/arun" class="user-card">
                <div class="avatar arun">A</div>
                <div class="user-name">Arun</div>
                <div class="user-role">Athlete</div>
                <div class="arrow-icon">&rarr;</div>
            </a>

            <a href="/select-user/bhushan" class="user-card">
                <div class="avatar bhushan">B</div>
                <div class="user-name">Bhushan</div>
                <div class="user-role">Athlete</div>
                <div class="arrow-icon">&rarr;</div>
            </a>
        </div>
    </div>

    <div class="footer">Workout Buddy v1.0</div>
</body>
</html>
