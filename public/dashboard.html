<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Workout Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }

        /* Subtle gradient background */
        .bg-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* Header / Nav */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #fff;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .username-badge {
            padding: 6px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }

        /* Welcome section */
        .welcome-section {
            margin-bottom: 40px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .welcome-greeting {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .welcome-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .welcome-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .action-btn.primary:hover {
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.5);
        }

        /* Stats Grid */
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.25s;
        }

        .stat-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        /* Goal section */
        .goal-section {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
            margin-bottom: 40px;
        }

        .goal-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.05));
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 16px;
            padding: 32px;
        }

        .goal-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .goal-text {
            font-size: 1.15rem;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 1rem;
            padding: 80px 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 6% auto;
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            animation: modalUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-save {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: #fff;
        }

        .btn-save:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-cancel {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .welcome-name { font-size: 1.8rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .welcome-actions { flex-direction: column; }
            .action-btn { justify-content: center; }
            .modal { margin: 4% auto; padding: 24px; }
        }

        @media (max-width: 400px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="header-logo">W</div>
                <span class="header-title">Workout Buddy</span>
            </div>
            <div class="header-right">
                <span class="username-badge" id="username">...</span>
                <button class="btn" onclick="openEditModal()">Edit Profile</button>
                <a href="/" class="btn">Switch User</a>
            </div>
        </div>

        <div id="loadingMessage" class="loading">
            <div class="loading-spinner"></div>
            Loading your profile...
        </div>

        <div id="dashboardContent" style="display: none;">
            <div class="welcome-section">
                <p class="welcome-greeting">Welcome back</p>
                <h1 class="welcome-name" id="welcomeName">...</h1>
                <div class="welcome-actions">
                    <a href="/workout-tracker" class="action-btn primary">Workout Tracker</a>
                    <a href="/calendar" class="action-btn">Calendar</a>
                </div>
            </div>

            <p class="section-label">Your Stats</p>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">&#127874;</div>
                    <div class="stat-label">Age</div>
                    <div class="stat-value" id="age">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#9878;&#65039;</div>
                    <div class="stat-label">Weight</div>
                    <div class="stat-value" id="weight">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128207;</div>
                    <div class="stat-label">Height</div>
                    <div class="stat-value" id="height">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128170;</div>
                    <div class="stat-label">Muscle Mass</div>
                    <div class="stat-value" id="muscleMass">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128200;</div>
                    <div class="stat-label">Body Fat</div>
                    <div class="stat-value" id="bodyFat">--</div>
                </div>
            </div>

            <div class="goal-section">
                <p class="section-label">Fitness Goal</p>
                <div class="goal-card">
                    <div class="goal-title">Current Goal</div>
                    <div class="goal-text" id="goal">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>

            <div id="successMessage" class="success-message"></div>

            <form id="editForm">
                <div class="form-group">
                    <label for="editAge">Age</label>
                    <input type="number" id="editAge" name="age" required min="1" max="120">
                </div>
                <div class="form-group">
                    <label for="editWeight">Weight</label>
                    <input type="text" id="editWeight" name="weight" required placeholder="e.g. 165 lbs">
                </div>
                <div class="form-group">
                    <label for="editHeight">Height</label>
                    <input type="text" id="editHeight" name="height" required placeholder='e.g. 5&apos;9"'>
                </div>
                <div class="form-group">
                    <label for="editMuscleMass">Muscle Mass</label>
                    <input type="text" id="editMuscleMass" name="muscleMass" required placeholder="e.g. 70 lbs">
                </div>
                <div class="form-group">
                    <label for="editBodyFat">Body Fat %</label>
                    <input type="text" id="editBodyFat" name="bodyFat" required placeholder="e.g. 15%">
                </div>
                <div class="form-group">
                    <label for="editGoal">Fitness Goal</label>
                    <textarea id="editGoal" name="goal" required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-modal btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-modal btn-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentProfile = null;

        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                if (!response.ok) {
                    if (response.redirected || response.status === 302) {
                        window.location.href = '/';
                        return;
                    }
                    console.error('Failed to load profile');
                    return;
                }

                const data = await response.json();
                currentProfile = data;
                displayProfile(data);
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function displayProfile(data) {
            const { username, profile } = data;
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('welcomeName').textContent = profile.name || username;
            document.getElementById('age').textContent = profile.age || '--';
            document.getElementById('weight').textContent = profile.weight || '--';
            document.getElementById('height').textContent = profile.height || '--';
            document.getElementById('muscleMass').textContent = profile.muscleMass || '--';
            document.getElementById('bodyFat').textContent = profile.bodyFat || '--';
            document.getElementById('goal').textContent = profile.goal || 'No goal set yet';

            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
        }

        function openEditModal() {
            if (!currentProfile) return;
            const profile = currentProfile.profile;
            document.getElementById('editAge').value = profile.age;
            document.getElementById('editWeight').value = profile.weight;
            document.getElementById('editHeight').value = profile.height;
            document.getElementById('editMuscleMass').value = profile.muscleMass;
            document.getElementById('editBodyFat').value = profile.bodyFat;
            document.getElementById('editGoal').value = profile.goal;
            document.getElementById('editModalOverlay').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModalOverlay').style.display = 'none';
            document.getElementById('successMessage').classList.remove('show');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                age: parseInt(document.getElementById('editAge').value),
                weight: document.getElementById('editWeight').value,
                height: document.getElementById('editHeight').value,
                muscleMass: document.getElementById('editMuscleMass').value,
                bodyFat: document.getElementById('editBodyFat').value,
                goal: document.getElementById('editGoal').value
            };
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                if (response.ok) {
                    currentProfile.profile = data.profile;
                    displayProfile(currentProfile);
                    const successMsg = document.getElementById('successMessage');
                    successMsg.textContent = 'Profile updated successfully!';
                    successMsg.classList.add('show');
                    setTimeout(() => closeEditModal(), 1500);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                alert('Network error. Please try again.');
            }
        });

        window.onclick = function(event) {
            const overlay = document.getElementById('editModalOverlay');
            if (event.target === overlay) closeEditModal();
        }

        loadProfile();
    </script>
</body>
</html>
