<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - Workout Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168,85,247,0.06) 0%, transparent 50%);
            z-index: 0;
        }
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px; z-index: 1;
        }

        .container {
            position: relative; z-index: 2;
            max-width: 1400px; margin: 0 auto; padding: 24px 20px;
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap; gap: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 16px; font-weight: 700;
        }
        .header-title { font-size: 1.1rem; font-weight: 700; }

        .header-controls {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }

        /* Shared form controls */
        .ctrl-select, .ctrl-date {
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #fff;
            font-family: inherit; font-size: 0.85rem;
            cursor: pointer; transition: border-color 0.2s;
        }
        .ctrl-select:focus, .ctrl-date:focus {
            outline: none; border-color: #6366f1;
        }
        .ctrl-select option { background: #1a1a1a; color: #fff; }
        .ctrl-date::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            border-radius: 8px; cursor: pointer;
            font-family: inherit; font-size: 0.85rem; font-weight: 500;
            transition: all 0.2s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #fff; }

        /* Day Selector */
        .day-selector { margin-bottom: 24px; }
        .day-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .day-btn {
            flex: 1; min-width: 120px; padding: 14px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6); border-radius: 12px;
            cursor: pointer; font-family: inherit;
            font-size: 0.9rem; font-weight: 600;
            transition: all 0.25s; text-align: center;
        }
        .day-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15); color: #fff;
        }
        .day-btn.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
            border-color: rgba(99,102,241,0.4); color: #fff;
            box-shadow: 0 0 20px rgba(99,102,241,0.1);
        }
        .day-btn small { display: block; font-size: 0.7rem; font-weight: 400; margin-top: 4px; opacity: 0.6; }

        /* Success toast */
        .success-message {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e; padding: 14px 20px; border-radius: 12px;
            margin-bottom: 20px; display: none; text-align: center;
            font-weight: 500; font-size: 0.9rem;
        }
        .success-message.show { display: block; animation: fadeUp 0.3s; }

        /* Main Layout */
        .main-layout {
            display: grid; grid-template-columns: 300px 1fr;
            gap: 24px; margin-top: 8px;
        }

        /* Calendar Sidebar */
        .calendar-sidebar {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 20px; border-radius: 16px;
            height: fit-content; position: sticky; top: 20px;
        }
        .calendar-sidebar h3 {
            font-size: 0.85rem; font-weight: 600;
            color: rgba(255,255,255,0.5); margin-bottom: 16px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .calendar-month-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .calendar-month-header h4 { font-size: 0.9rem; font-weight: 600; color: #fff; }
        .calendar-nav-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6); padding: 4px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .calendar-nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .mini-calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .mini-day-header {
            text-align: center; font-weight: 600;
            color: rgba(255,255,255,0.3); padding: 4px; font-size: 0.65rem;
            text-transform: uppercase;
        }
        .mini-calendar-day {
            aspect-ratio: 1;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 6px; padding: 2px;
            cursor: pointer; position: relative;
            transition: all 0.2s; background: rgba(255,255,255,0.02);
            font-size: 0.7rem; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .mini-calendar-day:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }
        .mini-calendar-day.other-month { opacity: 0.15; pointer-events: none; }
        .mini-calendar-day.today { border-color: #6366f1; border-width: 2px; }
        .mini-calendar-day.selected { background: rgba(99,102,241,0.2); border-color: #6366f1; }
        .mini-calendar-day.selected .mini-day-number { color: #fff; font-weight: 700; }
        .mini-calendar-day.has-workout { background: rgba(99,102,241,0.08); }
        .mini-calendar-day.selected.has-workout { background: rgba(99,102,241,0.25); }
        .mini-day-number { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
        .mini-workout-dots { display: flex; gap: 2px; margin-top: 1px; }
        .mini-dot { width: 3px; height: 3px; border-radius: 50%; }

        .workout-chest-back { background-color: #f87171; }
        .workout-lower-1 { background-color: #34d399; }
        .workout-shoulders-arms { background-color: #38bdf8; }
        .workout-posterior { background-color: #a3e635; }
        .workout-chest-back-2 { background-color: #fbbf24; }
        .workout-lower-2 { background-color: #a78bfa; }
        .workout-thursday { background-color: #f472b6; }

        /* Workout Content */
        .workout-content {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 32px; border-radius: 16px;
        }
        .workout-header { margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .workout-header h2 {
            font-size: 1.5rem; font-weight: 700; color: #fff;
            letter-spacing: -0.02em; margin-bottom: 4px;
        }
        .workout-header .phase-info { color: rgba(255,255,255,0.4); font-size: 0.85rem; }

        /* Exercise Card */
        .exercise-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 24px;
            margin-bottom: 20px; transition: border-color 0.2s;
        }
        .exercise-card:hover { border-color: rgba(255,255,255,0.1); }

        .exercise-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 16px;
            flex-wrap: wrap; gap: 10px;
        }
        .exercise-name {
            font-size: 1.1rem; font-weight: 700; color: #fff;
            letter-spacing: -0.01em;
        }
        .exercise-type {
            display: inline-block;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.2);
            color: #818cf8; padding: 3px 10px;
            border-radius: 6px; font-size: 0.7rem;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .exercise-specs {
            display: flex; gap: 20px; margin-bottom: 16px;
            flex-wrap: wrap; font-size: 0.8rem;
        }
        .spec-item { display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,0.5); }
        .spec-label { font-weight: 600; color: rgba(255,255,255,0.7); }

        .sets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-top: 16px;
        }
        .set-input-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px; border-radius: 10px;
            transition: all 0.2s;
        }
        .set-input-group.completed {
            border-color: rgba(34,197,94,0.3);
            background: rgba(34,197,94,0.05);
        }
        .set-label {
            font-size: 0.7rem; font-weight: 600;
            color: rgba(255,255,255,0.35); margin-bottom: 8px;
            display: block; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .input-row { display: flex; gap: 6px; align-items: center; }
        .set-input-group input {
            width: 100%; padding: 8px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px; font-size: 0.85rem;
            font-family: inherit; color: #fff;
            transition: border-color 0.2s;
        }
        .set-input-group input:focus { outline: none; border-color: #6366f1; }
        .set-input-group input::placeholder { color: rgba(255,255,255,0.2); }

        .save-btn {
            margin-top: 16px; width: 100%; padding: 12px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e; border-radius: 10px;
            font-family: inherit; font-size: 0.9rem;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .save-btn:hover {
            background: rgba(34,197,94,0.15);
            border-color: rgba(34,197,94,0.3);
            box-shadow: 0 4px 16px rgba(34,197,94,0.15);
        }

        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-state h3 {
            font-size: 1.2rem; font-weight: 600;
            color: rgba(255,255,255,0.4); margin-bottom: 8px;
        }
        .empty-state p { color: rgba(255,255,255,0.25); font-size: 0.9rem; }

        .exercise-note {
            color: #f87171; font-size: 0.75rem;
            margin-top: 4px; font-weight: 500;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .calendar-sidebar { position: relative; top: 0; }
        }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-controls { width: 100%; flex-wrap: wrap; }
            .ctrl-select, .ctrl-date, .btn {
                font-size: 16px; padding: 12px; min-height: 44px;
            }
            .day-buttons { gap: 6px; }
            .day-btn { min-width: calc(50% - 3px); padding: 12px 8px; font-size: 0.8rem; min-height: 56px; }
            .workout-content { padding: 20px 16px; }
            .workout-header h2 { font-size: 1.2rem; }
            .sets-grid { grid-template-columns: 1fr; }
            .set-input-group input {
                font-size: 16px; padding: 12px; min-height: 44px;
                -webkit-appearance: none; appearance: none;
            }
            .save-btn { font-size: 16px; padding: 14px; min-height: 48px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="/dashboard" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
                    <div class="header-logo">W</div>
                    <span class="header-title">Workout Tracker</span>
                </a>
            </div>
            <div class="header-controls">
                <input type="date" id="workoutDate" class="ctrl-date">
                <select id="phaseSelect" class="ctrl-select">
                    <option value="1">Phase 1</option>
                    <option value="2">Phase 2</option>
                    <option value="3">Phase 3</option>
                    <option value="4">Phase 4</option>
                </select>
                <select id="weekSelect" class="ctrl-select">
                    <option value="1">Week 1</option>
                    <option value="2">Week 2</option>
                    <option value="3">Week 3</option>
                </select>
                <a href="/dashboard" class="btn">Dashboard</a>
            </div>
        </div>

        <div class="day-selector">
            <div class="day-buttons" id="dayButtons"></div>
        </div>

        <div id="successMessage" class="success-message">Workout saved successfully!</div>

        <div class="main-layout">
            <div class="calendar-sidebar">
                <h3>Calendar</h3>
                <div class="mini-calendar">
                    <div class="calendar-month-header">
                        <button class="calendar-nav-btn" onclick="calendarPrevMonth()">&larr;</button>
                        <h4 id="calendarMonthName">Month Year</h4>
                        <button class="calendar-nav-btn" onclick="calendarNextMonth()">&rarr;</button>
                    </div>
                    <div class="mini-calendar-grid" id="miniCalendarGrid"></div>
                </div>
            </div>

            <div class="workout-content" id="workoutContent">
                <div class="empty-state">
                    <h3>Select a day to view your workout</h3>
                    <p>Choose a training day from the buttons above to get started</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDay = null;
        let currentWeek = 1;
        let currentPhase = 1;
        let currentDate = new Date();
        let workoutData = null;
        let savedLogs = {};

        async function init() {
            try {
                const today = new Date();
                const dateInput = document.getElementById('workoutDate');
                const todayStr = today.toISOString().split('T')[0];
                dateInput.valueAsDate = today;
                dateInput.max = todayStr;

                const programResponse = await fetch('/api/workout/program');
                workoutData = await programResponse.json();

                const statusResponse = await fetch('/api/workout/status');
                const status = await statusResponse.json();

                currentPhase = status.currentPhase;
                currentWeek = status.currentWeek;

                document.getElementById('phaseSelect').value = currentPhase;
                document.getElementById('weekSelect').value = currentWeek;

                loadDayButtons();

                const dayOfWeek = today.getDay();
                const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
                const todayName = dayNames[dayOfWeek];
                const phaseKey = `phase${currentPhase}`;
                if (workoutData[phaseKey] && workoutData[phaseKey].days[todayName]) {
                    selectDay(todayName);
                }

                await loadCalendarLogs();
                renderMiniCalendar();

                document.getElementById('workoutDate').addEventListener('change', onDateChange);
            } catch (error) {
                console.error('Error loading workout data:', error);
            }
        }

        function onDateChange() {
            const selectedDate = new Date(document.getElementById('workoutDate').value + 'T00:00:00');
            currentDate = selectedDate;
            const dayOfWeek = selectedDate.getDay();
            const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
            const dayName = dayNames[dayOfWeek];
            const phaseKey = `phase${currentPhase}`;
            if (workoutData && workoutData[phaseKey] && workoutData[phaseKey].days[dayName]) {
                selectDay(dayName);
            } else {
                document.getElementById('workoutContent').innerHTML = `
                    <div class="empty-state">
                        <h3>No workout scheduled for ${dayName.charAt(0).toUpperCase() + dayName.slice(1)}</h3>
                        <p>This day is a rest day in your current phase</p>
                    </div>`;
            }
        }

        function loadDayButtons() {
            if (!workoutData) return;
            const phaseKey = `phase${currentPhase}`;
            const phaseData = workoutData[phaseKey];
            if (!phaseData) return;

            const container = document.getElementById('dayButtons');
            container.innerHTML = '';

            Object.keys(phaseData.days).forEach(day => {
                const dayData = phaseData.days[day];
                const dayName = day.charAt(0).toUpperCase() + day.slice(1);
                const button = document.createElement('button');
                button.className = 'day-btn';
                button.setAttribute('data-day', day);
                button.onclick = () => selectDay(day);
                button.innerHTML = `${dayName}<small>${dayData.name}</small>`;
                container.appendChild(button);
            });
        }

        function selectDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`[data-day="${day}"]`);
            if (btn) btn.classList.add('active');
            loadDayWorkout(day);
        }

        async function loadDayWorkout(day) {
            const content = document.getElementById('workoutContent');
            if (!workoutData) { content.innerHTML = '<div class="empty-state"><h3>Loading...</h3></div>'; return; }

            const phaseKey = `phase${currentPhase}`;
            const phaseData = workoutData[phaseKey];
            if (!phaseData) { content.innerHTML = '<div class="empty-state"><h3>Phase data not found</h3></div>'; return; }

            const dayData = phaseData.days[day];
            if (!dayData) { content.innerHTML = '<div class="empty-state"><h3>No workout data found</h3></div>'; return; }

            try {
                const selectedDate = document.getElementById('workoutDate').value;
                const response = await fetch(`/api/workout/logs/${day}?phase=${currentPhase}&week=${currentWeek}&date=${selectedDate}`);
                const data = await response.json();
                savedLogs = data.logs || {};
            } catch (error) { console.error('Error loading logs:', error); savedLogs = {}; }

            const parseSetCount = (sets) => {
                if (typeof sets === 'number') return sets;
                const str = String(sets);
                if (str.includes('+')) return str.split('+').reduce((sum, num) => sum + parseInt(num.trim()), 0);
                return parseInt(str) || 0;
            };

            let html = `
                <div class="workout-header">
                    <h2>${dayData.name}</h2>
                    <p class="phase-info">Phase ${currentPhase} &middot; Week ${currentWeek} &middot; ${formatDate(document.getElementById('workoutDate').value)}</p>
                </div>`;

            dayData.exercises.forEach(exercise => {
                const weekKey = `week${currentWeek}`;
                const specs = exercise.weeks[weekKey];
                const savedLog = savedLogs[exercise.id];

                html += `
                    <div class="exercise-card">
                        <div class="exercise-header">
                            <div>
                                <span class="exercise-type">${exercise.type}</span>
                                <div class="exercise-name">${exercise.name}</div>
                                ${exercise.notes ? `<div class="exercise-note">${exercise.notes}</div>` : ''}
                            </div>
                        </div>
                        <div class="exercise-specs">
                            <div class="spec-item"><span class="spec-label">Sets:</span><span>${specs.sets}</span></div>
                            <div class="spec-item"><span class="spec-label">Reps:</span><span>${specs.reps}</span></div>
                            <div class="spec-item"><span class="spec-label">Rest:</span><span>${specs.rest}s</span></div>
                            ${specs.tempo ? `<div class="spec-item"><span class="spec-label">Tempo:</span><span>${specs.tempo}</span></div>` : ''}
                        </div>
                        <div class="sets-grid" id="sets-${exercise.id}">`;

                const totalSets = parseSetCount(specs.sets);
                for (let i = 1; i <= totalSets; i++) {
                    const savedSet = savedLog?.sets?.[i - 1] || { weight: '', reps: '' };
                    const isCompleted = savedSet.weight && savedSet.reps;
                    html += `
                        <div class="set-input-group ${isCompleted ? 'completed' : ''}">
                            <label class="set-label">Set ${i}</label>
                            <div class="input-row">
                                <input type="number" placeholder="Weight" id="${exercise.id}-set${i}-weight" value="${savedSet.weight || ''}" step="2.5">
                                <input type="number" placeholder="Reps" id="${exercise.id}-set${i}-reps" value="${savedSet.reps || ''}" step="1">
                            </div>
                        </div>`;
                }

                html += `</div>
                    <button class="save-btn" onclick="saveExercise('${exercise.id}', ${totalSets})">Save Exercise</button>
                </div>`;
            });

            content.innerHTML = html;
        }

        async function saveExercise(exerciseId, setCount) {
            const sets = [];
            for (let i = 1; i <= setCount; i++) {
                sets.push({
                    weight: document.getElementById(`${exerciseId}-set${i}-weight`).value || '',
                    reps: document.getElementById(`${exerciseId}-set${i}-reps`).value || ''
                });
            }
            try {
                const response = await fetch('/api/workout/logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exerciseId, phase: currentPhase, week: currentWeek, sets, date: document.getElementById('workoutDate').value })
                });
                const result = await response.json();
                if (result.success) {
                    showSuccessMessage();
                    const setsContainer = document.getElementById(`sets-${exerciseId}`);
                    setsContainer.querySelectorAll('.set-input-group').forEach((group, index) => {
                        if (sets[index].weight && sets[index].reps) group.classList.add('completed');
                        else group.classList.remove('completed');
                    });
                    await loadCalendarLogs();
                    renderMiniCalendar();
                }
            } catch (error) { console.error('Error saving workout:', error); alert('Failed to save workout.'); }
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        document.getElementById('phaseSelect').addEventListener('change', async (e) => {
            currentPhase = parseInt(e.target.value);
            currentDay = null;
            await updateStatus();
            loadDayButtons();
            document.getElementById('workoutContent').innerHTML = `
                <div class="empty-state">
                    <h3>Select a day to view your workout</h3>
                    <p>Choose a training day from the buttons above to get started</p>
                </div>`;
        });

        document.getElementById('weekSelect').addEventListener('change', async (e) => {
            currentWeek = parseInt(e.target.value);
            await updateStatus();
            if (currentDay) loadDayWorkout(currentDay);
        });

        async function updateStatus() {
            try {
                await fetch('/api/workout/status', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPhase, currentWeek })
                });
            } catch (error) { console.error('Error updating status:', error); }
        }

        // Mini Calendar
        let calendarDate = new Date();
        let calendarLogs = {};
        const dayTypeColors = {
            'monday': 'workout-chest-back', 'tuesday': 'workout-lower-1',
            'wednesday': 'workout-shoulders-arms', 'thursday': 'workout-thursday',
            'friday': 'workout-posterior', 'saturday': 'workout-chest-back-2'
        };

        async function loadCalendarLogs() {
            try {
                const month = calendarDate.getMonth() + 1;
                const year = calendarDate.getFullYear();
                const response = await fetch(`/api/calendar/logs?month=${month}&year=${year}`);
                const data = await response.json();
                calendarLogs = data.logs || {};
            } catch (error) { console.error('Error loading calendar logs:', error); calendarLogs = {}; }
        }

        async function renderMiniCalendar() {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            document.getElementById('calendarMonthName').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const grid = document.getElementById('miniCalendarGrid');
            grid.innerHTML = '';

            ['S','M','T','W','T','F','S'].forEach(d => {
                const header = document.createElement('div');
                header.className = 'mini-day-header';
                header.textContent = d;
                grid.appendChild(header);
            });

            for (let i = 0; i < startingDayOfWeek; i++) {
                const empty = document.createElement('div');
                empty.className = 'mini-calendar-day other-month';
                grid.appendChild(empty);
            }

            const today = new Date();
            const selectedDateStr = document.getElementById('workoutDate').value;

            for (let day = 1; day <= daysInMonth; day++) {
                const el = document.createElement('div');
                el.className = 'mini-calendar-day';
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) el.classList.add('today');
                if (dateStr === selectedDateStr) el.classList.add('selected');

                const num = document.createElement('div');
                num.className = 'mini-day-number';
                num.textContent = day;
                el.appendChild(num);

                if (calendarLogs[dateStr]) {
                    el.classList.add('has-workout');
                    const logData = calendarLogs[dateStr];
                    if (logData.workoutTypes && logData.workoutTypes.length > 0) {
                        const dots = document.createElement('div');
                        dots.className = 'mini-workout-dots';
                        logData.workoutTypes.slice(0,3).forEach(type => {
                            const dot = document.createElement('span');
                            dot.className = `mini-dot ${dayTypeColors[type] || 'workout-chest-back'}`;
                            dots.appendChild(dot);
                        });
                        el.appendChild(dots);
                    }
                }

                const currentDateObj = new Date(year, month, day);
                const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                if (currentDateObj > todayMidnight) {
                    el.style.opacity = '0.25'; el.style.cursor = 'not-allowed';
                } else {
                    el.onclick = () => { document.getElementById('workoutDate').value = dateStr; onDateChange(); };
                }
                grid.appendChild(el);
            }
        }

        async function calendarPrevMonth() { calendarDate.setMonth(calendarDate.getMonth()-1); await loadCalendarLogs(); renderMiniCalendar(); }
        async function calendarNextMonth() { calendarDate.setMonth(calendarDate.getMonth()+1); await loadCalendarLogs(); renderMiniCalendar(); }

        function formatDate(dateString) {
            const date = new Date(dateString + 'T00:00:00');
            return date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        init();
    </script>
</body>
</html>
